<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The One Community - SUPER CUP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at 50% -20%, #1f1f1f 0%, #050505 80%); color: white; scroll-behavior: smooth; }
        .hero-bg { background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://i.pinimg.com/736x/24/d5/68/24d5685afca388adf0b1850ab5acc0d3.jpg'); background-size: cover; background-position: center; height: 60vh; }
        @media (min-width: 768px) { .hero-bg { height: 80vh; } }
        
        .tour-card, .coin-card-modern { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid rgba(255,255,255,0.05); 
            min-width: 220px; 
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(10px);
        }
        
        @media (min-width: 768px) { .tour-card, .coin-card-modern { min-width: 260px; } }
        
        .tour-card:hover, .coin-card-modern:hover { 
            transform: translateY(-10px); 
            border-color: #dc2626; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <header class="fixed w-full z-50 transition-all duration-300 px-4 py-4 flex justify-between items-center bg-black/40 backdrop-blur-md border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="w-2.5 h-2.5 bg-red-600 rounded-full shadow-[0_0_10px_rgba(220,38,38,0.8)]"></div>
            <span class="font-bold tracking-widest text-xs md:text-lg uppercase">THE ONE COMMUNITY</span>
        </div>
        <nav class="hidden md:flex gap-8 text-xs font-medium uppercase tracking-widest text-gray-300">
            <a href="#" class="hover:text-red-500 transition-colors">Home</a>
            <a href="https://t.me/THE_ONE_eCommunity" target="_blank" class="hover:text-red-500 transition-colors">Channel</a>
            <a href="https://t.me/eMFootball_Players" target="_blank" class="hover:text-red-500 transition-colors">Group</a>
            <a href="https://t.me/Profit_Zio" target="_blank" class="hover:text-red-500 transition-colors">Contacts</a>
        </nav>
        <div class="md:hidden text-gray-300"><i class="fa-solid fa-bars text-lg"></i></div>
    </header>

    <section class="hero-bg relative flex items-center px-6 md:px-20">
        <div class="max-w-4xl">
            <h1 class="text-4xl md:text-9xl font-black leading-tight tracking-tighter bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-500">THE ONE<br>SUPER CUP</h1>
        </div>
    </section>

    <section class="py-12 md:py-24 px-4 md:px-20">
        <div class="text-center mb-10">
            <h2 class="text-2xl md:text-5xl font-bold uppercase tracking-tight">BE UNIQUE</h2>
            <div class="w-16 h-1 bg-red-600 mx-auto mt-4"></div>
        </div>

        <div class="flex gap-4 overflow-x-auto no-scrollbar pb-8">
            <a href="https://shelbyzio.github.io/supercupEPL/" target="_blank" class="tour-card group relative overflow-hidden rounded-xl cursor-pointer block w-[220px] md:w-[260px]">
                <img src="supercup1.jpg" class="w-full h-[300px] object-cover opacity-80 group-hover:opacity-100 transition-opacity">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex flex-col justify-end p-4">
                    <h3 class="text-sm md:text-xl font-bold uppercase">SUPER LEAGUE</h3>
                </div>
            </a>
            <a href="https://shelbyzio.github.io/supercupEPL/" target="_blank" class="tour-card group relative overflow-hidden rounded-xl cursor-pointer block w-[220px] md:w-[260px]">
                <img src="PWAUNG (27).jpg" class="w-full h-[300px] object-cover opacity-80 group-hover:opacity-100 transition-opacity">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex flex-col justify-end p-4">
                    <h3 class="text-sm md:text-xl font-bold uppercase">Premier League</h3>
                </div>
            </a>
            <a href="https://shelbyzio.github.io/supercupEPL/" target="_blank" class="tour-card group relative overflow-hidden rounded-xl cursor-pointer block w-[220px] md:w-[260px]">
                <img src="PWAUNG (28).jpg" class="w-full h-[300px] object-cover opacity-80 group-hover:opacity-100 transition-opacity">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex flex-col justify-end p-4">
                    <h3 class="text-sm md:text-xl font-bold uppercase">Spain LaLiga</h3>
                </div>
            </a>
            <a href="https://shelbyzio.github.io/supercupEPL/" target="_blank" class="tour-card group relative overflow-hidden rounded-xl cursor-pointer block w-[220px] md:w-[260px]">
                <img src="PWAUNG (29).jpg" class="w-full h-[300px] object-cover opacity-80 group-hover:opacity-100 transition-opacity">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex flex-col justify-end p-4">
                    <h3 class="text-sm md:text-xl font-bold uppercase">Italy Serie A</h3>
                </div>
            </a>
            <a href="https://shelbyzio.github.io/supercupEPL/" target="_blank" class="tour-card group relative overflow-hidden rounded-xl cursor-pointer block w-[220px] md:w-[260px]">
                <img src="PWAUNG (31).jpg" class="w-full h-[300px] object-cover opacity-80 group-hover:opacity-100 transition-opacity">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex flex-col justify-end p-4">
                    <h3 class="text-sm md:text-xl font-bold uppercase">Myanmar League</h3>
                </div>
            </a>
        </div>
    </section>

    <section class="py-12 md:py-24 px-4 md:px-20 bg-black/20">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-2xl md:text-3xl font-bold text-center mb-10 uppercase tracking-widest">EFOOTBALL COIN</h2>
            <div class="flex gap-4 overflow-x-auto no-scrollbar pb-10">
                <script>
                    const coins = [300, 550, 750, 1040, 2130, 3250, 5700, 12800];
                    const prices = [15000, 25000, 30000, 40000, 71000, 105000, 172000, 360000];
                    const coinImg = "https://i.pinimg.com/736x/d9/af/6d/d9af6ddb1dcd78d12657af728a08421f.jpg";

                    for(let i=0; i<coins.length; i++) {
                        document.write(`
                            <div class="coin-card-modern group relative overflow-hidden rounded-xl flex flex-col cursor-pointer w-[200px] shrink-0">
                                <div class="h-32 overflow-hidden relative">
                                    <img src="${coinImg}" class="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-opacity">
                                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
                                </div>
                                <div class="p-4 flex-grow">
                                    <div class="mb-2">
                                        <span class="text-[9px] text-gray-500 uppercase tracking-[0.2em]">Quantity</span>
                                        <h3 class="text-lg font-black text-white leading-tight">${coins[i].toLocaleString()}</h3>
                                    </div>
                                    <div class="mb-4">
                                        <span class="text-[9px] text-gray-500 uppercase tracking-[0.2em]">Price</span>
                                        <p class="text-lg text-white font-black tracking-tighter">${prices[i].toLocaleString()} MMK</p>
                                    </div>
                                    <a href="https://t.me/Profit_Zio" target="_blank" class="block w-full py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-center text-[10px] font-black uppercase tracking-[0.2em] transition-all active:scale-95">
                                        ဝယ်ယူရန်
                                    </a>
                                </div>
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>
    </section>

    <footer class="py-8 border-t border-white/5 text-center text-[10px] text-gray-600 tracking-widest uppercase">
        <p>&copy; 2026 THE ONE COMMUNITY.</p>
    </footer>
</body>
</html>
