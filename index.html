<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The One Community - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #0a0a0a; color: white; scroll-behavior: smooth; }
        .hero-bg { background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=2071&auto=format&fit=crop'); background-size: cover; background-position: center; height: 80vh; }
        .tour-card { transition: transform 0.3s ease, filter 0.3s ease; filter: grayscale(40%); }
        .tour-card:hover { transform: translateY(-10px); filter: grayscale(0%); }
        .nav-link:hover { color: #ff4d4d; }
        .coin-card-modern { transition: transform 0.3s ease; border: 1px solid #333; overflow: hidden; }
        .coin-card-modern:hover { transform: scale(1.02); border-color: #dc2626; }
    </style>
</head>
<body>

    <header class="fixed w-full z-50 transition-all duration-300 px-6 py-4 flex justify-between items-center bg-black/80 backdrop-blur-sm">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-red-600 rounded-full"></div>
            <span class="font-bold tracking-widest text-sm md:text-lg">THE ONE COMMUNITY</span>
        </div>
        <nav class="hidden md:flex gap-8 text-xs uppercase tracking-widest">
            <a href="#" class="nav-link text-red-500">Home</a>
            <a href="#" class="nav-link">About</a>
            <a href="#" class="nav-link">Tours</a>
            <a href="#" class="nav-link">Winner</a>
            <a href="#" class="nav-link">Contacts</a>
        </nav>
        <div class="md:hidden"><i class="fa-solid fa-bars text-lg"></i></div>
    </header>

    <section class="hero-bg relative flex items-center px-6 md:px-20">
        <div class="max-w-4xl">
            <h1 class="text-5xl md:text-9xl font-black leading-tight tracking-tighter">THE ONE<br>COMMUNITY</h1>
        </div>
    </section>

    <section class="py-16 px-6 md:px-20 bg-[#0f0f0f]">
        <div class="text-center mb-12">
            <p class="text-xs uppercase tracking-[0.3em] text-gray-400 mb-2">Get Unforgettable Emotions</p>
            <h2 class="text-2xl md:text-3xl font-bold uppercase tracking-widest">BE UNIQUE FROM OTHERS</h2>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
            <div class="tour-card relative group overflow-hidden rounded-sm cursor-pointer">
                <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070&auto=format&fit=crop" alt="Card 1" class="w-full h-[300px] md:h-[450px] object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex flex-col justify-end p-6">
                    <h3 class="text-lg font-bold">PRO LEAGUE</h3>
                </div>
            </div>
            <div class="tour-card relative group overflow-hidden rounded-sm cursor-pointer">
                <img src="https://images.unsplash.com/photo-1526749838127-142289650035?q=80&w=2070&auto=format&fit=crop" alt="Card 2" class="w-full h-[300px] md:h-[450px] object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex flex-col justify-end p-6">
                    <h3 class="text-lg font-bold">SUPER CUP</h3>
                </div>
            </div>
            <div class="tour-card relative group overflow-hidden rounded-sm cursor-pointer">
                <img src="https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?q=80&w=2070&auto=format&fit=crop" alt="Card 3" class="w-full h-[300px] md:h-[450px] object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex flex-col justify-end p-6">
                    <h3 class="text-lg font-bold">CHAMPIONS</h3>
                </div>
            </div>
            <div class="tour-card relative group overflow-hidden rounded-sm cursor-pointer">
                <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=2070&auto=format&fit=crop" alt="Card 4" class="w-full h-[300px] md:h-[450px] object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex flex-col justify-end p-6">
                    <h3 class="text-lg font-bold">COIN SHOP</h3>
                </div>
            </div>
            <div class="tour-card relative group overflow-hidden rounded-sm cursor-pointer">
                <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=2070&auto=format&fit=crop" alt="Card 5" class="w-full h-[300px] md:h-[450px] object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex flex-col justify-end p-6">
                    <h3 class="text-lg font-bold">EVENTS</h3>
                </div>
            </div>
        </div>
    </section>

    <section class="py-16 px-6 md:px-20 bg-[#050505]">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-2xl md:text-4xl font-bold text-center mb-12 uppercase tracking-widest">eFootball Coin Packages</h2>
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                <script>
                    const coins = [500, 1500, 3000, 5000, 7500, 10000, 15000, 20000];
                    const prices = [4.99, 9.99, 19.99, 29.99, 39.99, 49.99, 74.99, 99.99];
                    const coinImages = Array(8).fill("https://images.unsplash.com/photo-1556742049-0cf8441ecd5a?auto=format&fit=crop&q=80&w=500");
                    
                    for(let i=0; i<8; i++) {
                        document.write(`
                            <div class="coin-card-modern bg-[#111] rounded-sm flex flex-col">
                                <div class="h-32 md:h-48 overflow-hidden">
                                    <img src="${coinImages[i]}" alt="Coin Pack" class="w-full h-full object-cover">
                                </div>
                                <div class="p-3 md:p-5 flex-grow flex flex-col justify-between">
                                    <div>
                                        <h3 class="text-[10px] md:text-sm font-bold uppercase tracking-widest text-gray-400 mb-1">Package ${i+1}</h3>
                                        <p class="text-lg md:text-2xl font-black mb-2 md:mb-4">${coins[i]} Coins</p>
                                    </div>
                                    <button class="w-full py-2 md:py-3 border border-red-600 text-red-600 hover:bg-red-600 hover:text-white transition-all uppercase text-[9px] md:text-[10px] font-bold tracking-widest">$${prices[i]} - ဝယ်ယူမည်</button>
                                </div>
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>
    </section>

    <footer class="py-8 border-t border-gray-800 text-center text-[10px] text-gray-500 tracking-widest uppercase bg-[#0a0a0a]">
        <p>&copy; 2024 The One Community. All rights reserved.</p>
    </footer>
</body>
</html>
